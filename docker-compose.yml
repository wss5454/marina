services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-marina}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marina_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-marina_portal}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-marina} -d ${POSTGRES_DB:-marina_portal}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-marina}:${POSTGRES_PASSWORD:-marina_dev_password}@postgres:5432/${POSTGRES_DB:-marina_portal}
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - wallace_exports:/data/wallace_exports

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A marina_service.tasks.celery_app worker -l info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-marina}:${POSTGRES_PASSWORD:-marina_dev_password}@postgres:5432/${POSTGRES_DB:-marina_portal}
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - wallace_exports:/data/wallace_exports

  bridge:
    build:
      context: .
      dockerfile: bridge/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-marina}:${POSTGRES_PASSWORD:-marina_dev_password}@postgres:5432/${POSTGRES_DB:-marina_portal}
      WALLACE_EXPORT_DIR: /data/wallace_exports
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - wallace_exports:/data/wallace_exports

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
  wallace_exports:
